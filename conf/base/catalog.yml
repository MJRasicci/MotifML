# Kedro datasets for MotifML's symbolic-data pipelines.

raw_motif_json_corpus:
  type: motifml.datasets.motif_json_corpus_dataset.MotifJsonCorpusDataset
  filepath: data/01_raw/motif_json
  glob_pattern: "**/*.json"
  autobuild:
    source_filepath: data/00_corpus
    source_glob_pattern: "**/*"
    cli_filepath: tools/motif-cli
    build_state_filepath: data/02_intermediate/ingestion/raw_motif_json_build_state.json
    clean_output_on_rebuild: true

raw_motif_json_corpus_shard:
  type: motifml.datasets.motif_json_shard_dataset.MotifJsonShardDataset
  filepath: data/01_raw/motif_json
  partition_index_filepath: data/02_intermediate/ingestion/raw_partition_index.json
  shard_id: "${runtime_params:execution.shard_id,__all__}"

raw_motif_json_manifest:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/02_intermediate/ingestion/raw_motif_json_manifest.json

raw_motif_json_summary:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/08_reporting/ingestion/raw_motif_json_summary.json

raw_partition_index:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/02_intermediate/ingestion/raw_partition_index.json

raw_shard_manifests:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/02_intermediate/ingestion/raw_shard_manifests.json

motif_ir_manifest:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/02_intermediate/ir/motif_ir_manifest.json

motif_ir_manifest_shard:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/02_intermediate/ir/manifests/shards/${runtime_params:execution.shard_id,__all__}.json

motif_ir_manifest_shard_collection:
  type: motifml.datasets.json_directory_dataset.JsonDirectoryDataset
  filepath: data/02_intermediate/ir/manifests/shards

motif_ir_validation_report:
