  filepath: data/08_reporting/ir/validation_shards/${runtime_params:execution.shard_id,__all__}.json

motif_ir_validation_report_shard_collection:
  type: motifml.datasets.json_directory_dataset.JsonDirectoryDataset
  filepath: data/08_reporting/ir/validation_shards

motif_ir_summary:
  type: motifml.datasets.json_dataset.JsonDataset
  filepath: data/08_reporting/ir/motif_ir_summary.json

motif_ir_summary_shard:
