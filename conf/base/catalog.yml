  filepath: data/08_reporting/ir/summary_shards

motif_ir_corpus:
  type: motifml.datasets.motif_ir_corpus_dataset.MotifIrCorpusDataset
  filepath: data/02_intermediate/ir/documents

motif_ir_corpus_shard:
