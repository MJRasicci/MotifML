ir_build_metadata:
  ir_schema_version: "1.0.0"
  corpus_build_version: "ir-build-v1"
  build_timestamp: "2026-03-19T00:00:00-04:00"

normalization:
  contract_name: motifml.normalized_ir
  contract_version: "1.0.0"
  serialized_document_format: motifml.ir.document
  normalization_strategy: passthrough_v1
  allow_optional_overlays: true
  allow_optional_views: true
  task_agnostic_guarantees:
    - stable_source_relative_identity
    - task_agnostic_domain_truth
    - no_model_specific_flattening
    - no_model_specific_windowing
  forbidden_model_fields:
    - attention_mask
    - input_ids
    - model_input_version
    - padding_strategy
    - split
    - split_version
    - target_ids
    - token_count
    - token_ids
    - training_run_id
    - vocabulary_version
    - window_start_offsets

ir_validation:
  rule_severities:
    onset_ownership: error
    note_ownership: error
    note_time_alignment: error
    voice_lane_onset_timing: error
    attack_order_contiguity: error
    sounding_duration_positive: error
    tie_chain_linear: error
    voice_lane_chain_stability: error
    note_order_canonical: error
    edge_endpoint_reference_integrity: error
    forbidden_metadata_absent: error
    phrase_span_validity: error
    fretted_string_collision: error

feature_extraction:
  projection_type: sequence
  sequence_mode: baseline_v1
  derived_edge_families_included: []

tokenization:
  vocabulary_strategy: projection_native
  max_sequence_length: 8
  padding_strategy: right
  time_resolution: 96

seed: 17

data_split:
  ratios:
    train: 0.8
    validation: 0.1
    test: 0.1
  hash_seed: 17
  grouping_strategy: document_id
  grouping_key_fallback: relative_path

sequence_schema:
  schema_name: baseline_sequence
  schema_mode: baseline_v1
  note_payload_fields:
    - pitch
    - duration
  structure_markers:
    enabled: true
    marker_kinds:
      - part
      - staff
      - bar
      - voice_lane
      - onset_group
  controls:
    include_point_controls: true
    point_control_kinds:
      - tempo_change
      - dynamic_change
      - fermata
    include_span_controls: true
    span_control_kinds:
      - hairpin
      - ottava

vocabulary:
  time_resolution: 96
  minimum_frequency: 1
  maximum_size: 65536
  special_tokens:
    pad: <pad>
    bos: <bos>
    eos: <eos>
    unk: <unk>
  guardrails:
    minimum_vocabulary_size: 7
    required_token_families:
      - NOTE_DURATION
      - NOTE_PITCH
      - STRUCTURE
    maximum_top_token_fraction: 0.6
    maximum_unk_fraction: 0.25

model_input:
  projection_type: sequence
  sequence_mode: baseline_v1
  context_length: 256
  stride: 128
  padding_strategy: right
  special_token_policy:
    bos: document
    eos: document
    padding_interaction: outside_boundaries
    unknown_token_mapping: map_to_unk
  storage:
    backend: parquet
    schema_version: parquet-v1
  reporting:
    worst_document_limit: 10
    oversized_token_count_threshold: 8192

model:
  architecture: decoder_only_transformer
  embedding_dim: 256
  hidden_size: 256
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  positional_encoding: learned

training:
  device: cpu
  batch_size: 8
  num_epochs: 5
  learning_rate: 0.0005
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  optimizer: adamw
  lr_scheduler:
    name: cosine_decay
    warmup_steps: 100

evaluation:
  device: cpu
  batch_size: 8
  top_k: 5
  decode_max_tokens: 256
  splits:
    - validation
    - test
  qualitative:
    samples_per_split: 2
    prompt_token_count: 32
    summary_token_limit: 24
  guardrails:
    maximum_split_unk_rate: 0.25
    maximum_generated_unk_rate: 0.25

execution:
  shard_id: __all__
  max_parallel_shards: 1

partitioning:
  max_documents_per_shard: 64
  max_raw_bytes_per_shard: 268435456

performance:
  reporting:
    enabled: true
    report_dir: data/08_reporting/performance
    report_basename: pipeline_profile
    top_n: 10
  dataset_run_cache:
    enabled: true
    copy_mode: assign
    release_when_unused: true
    dataset_names:
      - raw_motif_json_corpus
      - raw_motif_json_corpus_shard
      - motif_ir_corpus
      - motif_ir_corpus_shard
      - normalized_ir_corpus
      - normalized_ir_corpus_shard
      - motif_ir_manifest
      - motif_ir_manifest_shard
      - ir_features
      - ir_features_shard
      - model_input
      - model_input_shard
